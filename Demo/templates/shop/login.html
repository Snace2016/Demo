{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <img src="{% static 'images/icon.png' %}" alt="Логотип компании" class="login-card__logo">
        <form method="post" class="form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_login">{{ form.login.label }}</label>
                {{ form.login }}
                {% if form.login.errors %}
                    <span class="form-error">{{ form.login.errors.0 }}</span>
                {% endif %}
            </div>
            <div class="form-group">
                <label for="id_password">{{ form.password.label }}</label>
                {{ form.password }}
                {% if form.password.errors %}
                    <span class="form-error">{{ form.password.errors.0 }}</span>
                {% endif %}
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn--primary">Войти</button>
                <a href="{% url 'guest_products' %}" class="btn btn--secondary">Войти как гость</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
